<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Convoi Pro V40.46</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #fbbf24; --danger: #ef4444; --text: #f1f5f9; }
       
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }

        /* LE BOÎTIER : Taille fixe pour rester "petit" partout */
        .app-shell {
            background: var(--card);
            width: 330px;
            height: 620px;
            border-radius: 40px;
            border: 3px solid #334155;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            padding: 20px; box-sizing: border-box;
            position: relative;
        }

        #lock-screen {
            position: absolute; inset: 0; background: #000; border-radius: 35px;
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 14px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: #000; padding: 15px; width: 100%; font-weight: bold; border-radius: 12px; border:none; cursor: pointer; }
       
        .status-bar { display: flex; justify-content: space-between; font-size: 12px; color: var(--accent); margin-bottom: 10px; padding: 5px; background: rgba(0,0,0,0.2); border-radius: 10px; }
       
        #ptt-btn {
            width: 95px; height: 95px; border-radius: 50%; background: #334155;
            border: 6px solid #475569; margin: 10px auto;
            display: flex; align-items: center; justify-content: center; font-size: 32px;
            cursor: pointer; transition: 0.2s;
        }
        #ptt-btn:active { background: var(--danger); transform: scale(0.9); border-color: white; }

        .history {
            flex-grow: 1; background: #020617; border-radius: 20px;
            margin: 10px 0; padding: 12px; overflow-y: auto; font-size: 13px; text-align: left;
            border: 1px solid #1e293b;
        }
        .help { color: #38bdf8; font-size: 11px; font-style: italic; border: 1px dashed #38bdf8; padding: 8px; border-radius: 10px; margin-bottom: 10px; line-height: 1.3; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="lock-screen">
        <h3 style="color:var(--accent)">ACCÈS RÉSERVÉ</h3>
        <input type="password" id="master-code" placeholder="Code" style="width: 130px; text-align: center;">
        <button class="btn-main" onclick="checkCode()" style="width: 130px; margin-top:10px;">VALIDER</button>
    </div>

    <div id="setup-ui" style="display: flex; flex-direction: column; height: 100%; justify-content: center;">
        <h2 style="text-align: center; color: var(--accent); margin-top: 0;">RADIO PRO</h2>
        <input type="text" id="user-name" placeholder="VOTRE PRÉNOM">
        <input type="text" id="convoi-id" placeholder="ID DU CONVOI">
        <select id="my-lang">
            <option value="sq-AL">🇦🇱 Albanais</option>
            <option value="de-DE">🇩🇪 Allemand</option>
            <option value="en-GB">🇬🇧 Anglais</option>
            <option value="hy-AM">🇦🇲 Arménien</option>
            <option value="at-AT">🇦🇹 Autrichien</option>
            <option value="az-AZ">🇦🇿 Azéri</option>
            <option value="nl-BE">🇧🇪 Belge</option>
            <option value="be-BY">🇧🇾 Biélorusse</option>
            <option value="bs-BA">🇧🇦 Bosniaque</option>
            <option value="bg-BG">🇧🇬 Bulgare</option>
            <option value="hr-HR">🇭🇷 Croate</option>
            <option value="da-DK">🇩🇰 Danois</option>
            <option value="es-ES">🇪🇸 Espagnol</option>
            <option value="et-EE">🇪🇪 Estonien</option>
            <option value="fi-FI">🇫🇮 Finnois</option>
            <option value="fr-FR" selected>🇫🇷 Français</option>
            <option value="ka-GE">🇬🇪 Géorgien</option>
            <option value="el-GR">🇬🇷 Grec</option>
            <option value="nl-NL">🇳🇱 Hollandais</option>
            <option value="hu-HU">🇭🇺 Hongrois</option>
            <option value="ga-IE">🇮🇪 Irlandais</option>
            <option value="is-IS">🇮🇸 Islandais</option>
            <option value="it-IT">🇮🇹 Italien</option>
            <option value="kk-KZ">🇰🇿 Kazakh</option>
            <option value="lv-LV">🇱🇻 Letton</option>
            <option value="li-LI">🇱🇮 Liechtensteinois</option>
            <option value="lt-LT">🇱🇹 Lituanien</option>
            <option value="lb-LU">🇱🇺 Luxembourgeois</option>
            <option value="mk-MK">🇲🇰 Macédonien</option>
            <option value="mt-MT">🇲🇹 Maltais</option>
            <option value="md-MD">🇲🇩 Moldave</option>
            <option value="mc-MC">🇲🇨 Monégasque</option>
            <option value="me-ME">🇲🇪 Monténégrin</option>
            <option value="no-NO">🇳🇴 Norvégien</option>
            <option value="pl-PL">🇵🇱 Polonais</option>
            <option value="pt-PT">🇵🇹 Portugais</option>
            <option value="ro-RO">🇷🇴 Roumain</option>
            <option value="ru-RU">🇷🇺 Russe</option>
            <option value="sm-SM">🇸🇲 Saint-Marinais</option>
            <option value="sr-RS">🇷🇸 Serbe</option>
            <option value="sk-SK">🇸🇰 Slovaque</option>
            <option value="sl-SI">🇸🇮 Slovène</option>
            <option value="sv-SE">🇸🇪 Suédois</option>
            <option value="ch-FR">🇨🇭 Suisse</option>
            <option value="cs-CZ">🇨🇿 Tchèque</option>
            <option value="tr-TR">🇹🇷 Turc</option>
            <option value="va-VA">🇻🇦 Vaticanais</option>
        </select>
        <button class="btn-main" onclick="startApp()">DÉMARRER LA RADIO</button>
    </div>

    <div id="radio-ui" style="display: none; flex-direction: column; height: 100%;">
        <div class="status-bar">
            <b id="label-name"></b>
            <span id="label-convoi" style="text-decoration: underline; cursor: pointer;" onclick="alert('Dossier Convoi Actif')"></span>
        </div>
       
        <div id="ptt-btn" onmousedown="startMic()" onmouseup="stopMic()" ontouchstart="startMic()" ontouchend="stopMic()">🎙️</div>
       
        <div class="history" id="chat-box">
            <div class="help">Maintenez le micro pour parler. Votre voix sera traduite automatiquement chez vos collègues.</div>
        </div>

        <button onclick="location.reload()" style="background:none; color:#64748b; border:none; font-size:11px; cursor:pointer; margin-top: 5px;">✖ Quitter la session</button>
    </div>
</div>

<script>
    const CODE_A = "2109", CODE_B = "1234";
    let peer, conn, recognition;

    function checkCode() {
        const val = document.getElementById('master-code').value;
        if(val === CODE_A || val === CODE_B) document.getElementById('lock-screen').style.display = 'none';
        else alert("Code erroné");
    }

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRec) { recognition = new SpeechRec(); recognition.continuous = false; }

    function startApp() {
        const name = document.getElementById('user-name').value || "Chauffeur";
        const code = document.getElementById('convoi-id').value.toUpperCase() || "CONVOI";
        peer = new Peer(code + "_" + Math.random().toString(36).substr(2, 4));
        peer.on('open', () => {
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('radio-ui').style.display = 'flex';
            document.getElementById('label-name').innerText = "👤 " + name;
            document.getElementById('label-convoi').innerText = "📂 " + code;
            setupConn(peer.connect(code));
        });
        peer.on('connection', (c) => setupConn(c));
    }

    function setupConn(c) {
        conn = c;
        conn.on('data', async (data) => {
            const lang = document.getElementById('my-lang').value.split('-')[0];
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(data.text)}&langpair=${data.lang}|${lang}`);
                const json = await res.json();
                const text = json.responseData.translatedText;
                addMsg(data.user, text);
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = document.getElementById('my-lang').value; window.speechSynthesis.speak(ut);
            } catch(e) { addMsg(data.user, data.text); }
        });
    }

    function startMic() { if(recognition) { try { recognition.lang = document.getElementById('my-lang').value; recognition.start(); } catch(e){} } }
    function stopMic() { if(recognition) recognition.stop(); }

    if(recognition) {
        recognition.onresult = (e) => {
            const t = e.results[0][0].transcript;
            addMsg("Moi", t);
            if(conn && conn.open) conn.send({ text: t, lang: document.getElementById('my-lang').value.split('-')[0], user: document.getElementById('user-name').value });
        };
    }

    function addMsg(u, t) {
        const div = document.createElement('div');
        div.style.padding = "5px 0"; div.style.borderBottom = "1px solid #1e293b";
        div.innerHTML = `<b style="color:var(--accent)">${u}:</b> ${t}`;
        const box = document.getElementById('chat-box');
        box.prepend(div);
    }
</script>
</body>
</html>
